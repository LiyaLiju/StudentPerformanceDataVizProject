<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>D3 Stacked Bar Chart - Hours Distribution By Major</title>
	</head>
	<style>
		body {
			font-family: "Georgia", serif;
			max-width: 900px;
			margin: 40px 40px;
			padding: 0 20px;
			color: #222;
			background: #fff;
		}

		h2 {
			font-size: 20px;
			font-weight: 500;
			margin-bottom: 4px;
		}

		p.subtitle {
			font-size: 14px;
			color: #666;
			margin: 0 0 20px;
		}

		.toggle-group {
			display: flex;
			margin-bottom: 24px;
			border: 1px solid #ccc;
			border-radius: 8px;
			overflow: hidden;
			width: fit-content;
		}

		.toggle-group button {
			padding: 7px 18px;
			font-size: 13px;
			background: #fff;
			color: #555;
			border: none;
			cursor: pointer;
		}

		.toggle-group button:not(:last-child) {
			border-right: 1px solid #ccc;
		}

		.toggle-group button.active {
			background: #222;
			color: #fff;
		}

		#tooltip {
			position: absolute;
			display: none;
			pointer-events: none;
		}

		#legend {
			margin-top: 16px;
		}

		#component-wrapper {
			align-items: flex-start;
			gap: 24px;
			width: fit-content;
		}
	</style>

	<body>
		<h2>Daily Study, Sleep, and Social Hours Distribution by Major</h2>
		<p class="subtitle">
			A stacked bar chart of average hours students spent studying, sleeping,
			and socializing per day, grouped by major
		</p>
		<div id="stacked-bar-chart"></div>
		<div id="legend"></div>
		<div id="tooltip"></div>
		<div class="toggle-group">
			<button id="major" class="active" onclick="handleToggle('major')">
				By Major
			</button>
			<button id="major-type" onclick="handleToggle('major-type')">
				By Major Type
			</button>
		</div>
		<script src="https://d3js.org/d3.v7.min.js"></script>
		<script src="stacked-bar-chart.js"></script>
		<script>
			function handleToggle(group) {
				document
					.getElementById("major")
					.classList.toggle("active", group === "major");
				document
					.getElementById("major-type")
					.classList.toggle("active", group === "major-type");
				renderChart(group);
			}
		</script>
	</body>
</html>
